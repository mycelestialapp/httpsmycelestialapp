<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>灵摆仪式 · 问答之光</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:wght@400;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #030514;
      color: #f0e6d2;
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sanctuary {
      position: relative;
      width: 100%;
      max-width: 1200px;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #starCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.9;
    }
    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .header {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeSlideUp 1s ease forwards;
    }
    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 8vw, 3.8rem);
      font-weight: 900;
      letter-spacing: 8px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffd700, #b8860b, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% auto;
      animation: shimmer 6s linear infinite;
      filter: drop-shadow(0 0 30px rgba(255,215,0,0.7));
      margin-bottom: 0.5rem;
    }
    .title span {
      margin: 0 0.3rem;
      color: #ffd700;
      background: none;
      -webkit-text-fill-color: #ffd700;
    }
    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      color: rgba(255,255,255,0.8);
      letter-spacing: 2px;
      text-shadow: 0 0 15px rgba(255,215,0,0.3);
      border-bottom: 1px dashed rgba(255,215,0,0.3);
      padding-bottom: 1rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .pendulum-zone {
      position: relative;
      width: 100%;
      min-height: 340px;
      margin: 1rem 0 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #threeContainer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      min-height: 300px;
      border-radius: 30px;
      pointer-events: none;
    }
    .board-wrapper {
      position: relative;
      z-index: 5;
      margin-top: 2.5rem;
      transition: transform 0.3s ease, filter 0.3s ease;
    }
    .board-wrapper:hover {
      transform: scale(1.02);
      filter: drop-shadow(0 0 40px #ffd700);
    }
    .board {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #6b5f2e, #1f1a0c);
      border: 5px solid #ffd700;
      box-shadow: 0 0 60px rgba(255,215,0,0.6), inset 0 0 50px rgba(255,215,0,0.3);
      position: relative;
      overflow: hidden;
      animation: boardGlow 4s infinite alternate;
    }
    @keyframes boardGlow {
      0% { box-shadow: 0 0 40px rgba(255,215,0,0.5), inset 0 0 30px rgba(255,215,0,0.2); }
      100% { box-shadow: 0 0 80px #ffd700, inset 0 0 60px #ffd700; }
    }
    .board::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-conic-gradient(from 0deg, rgba(255,215,0,0.1) 0deg 2deg, transparent 2deg 45deg);
      border-radius: 50%;
    }
    .board::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.15"/></svg>');
      mix-blend-mode: overlay;
      pointer-events: none;
      border-radius: 50%;
    }
    .sector-label {
      position: absolute;
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 600;
      color: #ffd700;
      text-shadow: 0 0 12px #ffd700;
      background: rgba(0,0,0,0.5);
      padding: 4px 10px;
      border-radius: 30px;
      border: 1px solid rgba(255,215,0,0.7);
      backdrop-filter: blur(4px);
      white-space: nowrap;
      transition: all 0.2s;
      pointer-events: auto;
      cursor: default;
      z-index: 10;
    }
    .sector-label:hover {
      transform: scale(1.15);
      border-color: #ffd700;
      box-shadow: 0 0 25px #ffd700;
    }
    .label-yes { top: 10%; left: 50%; transform: translateX(-50%); }
    .label-no { bottom: 10%; left: 50%; transform: translateX(-50%); }
    .label-maybe { top: 50%; left: 5%; transform: translateY(-50%); }
    .label-rephrase { top: 50%; right: 5%; transform: translateY(-50%); }
    .label-reask { top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .mode-switch {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      justify-content: center;
      margin-top: 1.5rem;
    }
    .mode-btn {
      padding: 0.6rem 1.5rem;
      background: rgba(10, 10, 20, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 40px;
      color: #ffd700;
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 5px 20px rgba(0,0,0,0.8);
    }
    .mode-btn:hover,
    .mode-btn.active {
      background: rgba(255,215,0,0.2);
      border-color: #ffd700;
      box-shadow: 0 0 30px #ffd700;
      transform: translateY(-3px);
    }
    .footer {
      width: 100%;
      max-width: 650px;
      margin-top: 1rem;
      animation: fadeSlideUp 1s ease 0.3s forwards;
      opacity: 0;
      animation-fill-mode: forwards;
    }
    .input-group {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .question-input {
      flex: 1 1 280px;
      padding: 1rem 1.8rem;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 60px;
      color: white;
      font-size: 1.1rem;
      letter-spacing: 1px;
      transition: all 0.3s;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
    }
    .question-input:focus {
      border-color: #ffd700;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 0 40px rgba(255,215,0,0.4);
      outline: none;
    }
    .question-input::placeholder {
      color: rgba(255,255,255,0.3);
      font-style: italic;
    }
    .ask-btn {
      padding: 1rem 2.5rem;
      background: linear-gradient(145deg, #ffd700, #b8860b);
      border: none;
      border-radius: 60px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #0a0d1f;
      box-shadow: 0 15px 30px rgba(0,0,0,0.7), 0 0 60px rgba(255,215,0,0.5);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1.1rem;
    }
    .ask-btn:hover:not(:disabled) {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.9), 0 0 80px #ffd700;
    }
    .ask-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .result-card {
      background: rgba(10, 15, 25, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 40px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 0 40px rgba(255,215,0,0.1);
    }
    .result-badge {
      display: inline-block;
      padding: 0.5rem 1.8rem;
      background: rgba(0,0,0,0.3);
      border-radius: 50px;
      border-left: 4px solid #ffd700;
      margin-bottom: 1.5rem;
    }
    .result-badge__label { color: rgba(255,255,255,0.7); font-size: 1rem; }
    .result-badge__value {
      color: #ffd700;
      font-weight: 700;
      margin-left: 1rem;
      font-size: 1.4rem;
      text-transform: uppercase;
      text-shadow: 0 0 15px #ffd700;
    }
    .interpretation-item {
      padding: 1.2rem 0;
      border-bottom: 1px dashed rgba(255,215,0,0.2);
    }
    .interpretation-item:last-child { border-bottom: none; }
    .interpretation-item__title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      color: #ffd700;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 8px #ffd700;
    }
    .interpretation-item__text {
      font-size: 1rem;
      line-height: 1.6;
      color: rgba(255,255,255,0.9);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }
    .action-btn {
      padding: 0.7rem 2rem;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 40px;
      color: #ffd700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    }
    .action-btn:hover {
      background: rgba(255,215,0,0.15);
      border-color: #ffd700;
      box-shadow: 0 0 30px rgba(255,215,0,0.4);
      transform: scale(1.05);
    }
    @media (max-width: 600px) {
      .board { width: 180px; height: 180px; }
      .sector-label { font-size: 0.8rem; padding: 2px 6px; }
      .mode-btn { padding: 0.5rem 1rem; font-size: 0.8rem; }
      .question-input { flex: 1 1 100%; }
      .ask-btn { width: 100%; }
      .result-card { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="sanctuary">
    <canvas id="starCanvas"></canvas>
    <div class="content">
      <div class="header">
        <h1 class="title">灵摆仪式<span>·</span>问答之光</h1>
        <p class="subtitle">轻声说出你的问题，聆听宇宙微光给出的方向。</p>
      </div>
      <div class="pendulum-zone">
        <div id="threeContainer"></div>
        <div class="board-wrapper">
          <div class="board">
            <div class="sector-label label-yes">YES</div>
            <div class="sector-label label-no">NO</div>
            <div class="sector-label label-maybe">MAYBE</div>
            <div class="sector-label label-rephrase">REPHRASE</div>
            <div class="sector-label label-reask">REASK</div>
          </div>
          <div class="mode-switch">
            <button class="mode-btn active">Yes-No</button>
            <button class="mode-btn">字母盘</button>
            <button class="mode-btn">星座盘</button>
            <button class="mode-btn">五行盘</button>
          </div>
        </div>
      </div>
      <div class="footer">
        <div class="input-group">
          <input type="text" class="question-input" placeholder="输入你的问题…" id="questionInput">
          <button class="ask-btn" id="askBtn">询问</button>
        </div>
        <div class="result-card" id="resultCard" style="display: none;">
          <div class="result-badge">
            <span class="result-badge__label">灵摆指向</span>
            <strong class="result-badge__value" id="resultValue">YES</strong>
          </div>
          <div class="interpretations" id="interpretations"></div>
        </div>
        <div class="actions">
          <button class="action-btn" id="historyBtn">📜 历史</button>
          <button class="action-btn" id="shareBtn">✨ 分享</button>
          <button class="action-btn" id="soundToggle">🔊 声音开</button>
        </div>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.126.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const container = document.getElementById('threeContainer');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x030514);

    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0.8, 5);
    camera.lookAt(0, 0.5, 0);

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0x404060);
    scene.add(ambient);
    const light = new THREE.PointLight(0xffaa33, 2, 15);
    light.position.set(2, 3, 4);
    scene.add(light);
    const backLight = new THREE.PointLight(0x8866ff, 1, 15);
    backLight.position.set(-2, 1, -2);
    scene.add(backLight);

    const pivot = new THREE.Group();
    pivot.position.set(0, 0.8, 0);

    const crystalGeo = new THREE.OctahedronGeometry(0.22, 0);
    const crystalMat = new THREE.MeshPhongMaterial({
      color: 0xcceeff,
      emissive: 0x224466,
      shininess: 100,
      transparent: true,
      opacity: 0.9,
      flatShading: false
    });
    const crystal = new THREE.Mesh(crystalGeo, crystalMat);
    crystal.position.y = -0.6;
    pivot.add(crystal);

    const topGeo = new THREE.SphereGeometry(0.1, 24);
    const topMat = new THREE.MeshPhongMaterial({ color: 0xffd700, emissive: 0x442200 });
    const top = new THREE.Mesh(topGeo, topMat);
    top.position.y = 0.1;
    pivot.add(top);

    for (let i = 0; i < 3; i++) {
      const linkGeo = new THREE.TorusGeometry(0.06, 0.02, 8, 20);
      const linkMat = new THREE.MeshPhongMaterial({ color: 0xccaa88, emissive: 0x111111 });
      const link = new THREE.Mesh(linkGeo, linkMat);
      link.rotation.x = Math.PI / 2;
      link.position.y = 0.3 - i * 0.18;
      pivot.add(link);
    }

    scene.add(pivot);
    pivot.rotation.x = 0.1;
    pivot.rotation.z = 0.1;

    function animate() {
      requestAnimationFrame(animate);
      const time = Date.now() * 0.001;
      light.position.x = 2.5 * Math.sin(time * 0.3);
      light.position.z = 3 * Math.cos(time * 0.2);
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      const w = container.clientWidth;
      const h = container.clientHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    });

    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let width = window.innerWidth;
    let height = window.innerHeight;

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * devicePixelRatio;
      canvas.height = height * devicePixelRatio;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(devicePixelRatio, devicePixelRatio);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const stars = [];
    for (let i = 0; i < 200; i++) {
      stars.push({
        x: Math.random() * width,
        y: Math.random() * height,
        r: Math.random() * 2 + 0.5,
        vx: (Math.random() - 0.5) * 0.03,
        vy: (Math.random() - 0.5) * 0.03,
        alpha: Math.random() * 0.7 + 0.3
      });
    }

    function drawStars() {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#030514';
      ctx.fillRect(0, 0, width, height);
      stars.forEach(s => {
        s.x += s.vx;
        s.y += s.vy;
        if (s.x < 0) s.x = width;
        if (s.x > width) s.x = 0;
        if (s.y < 0) s.y = height;
        if (s.y > height) s.y = 0;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        const gold = 215 + Math.floor(Math.random() * 40);
        ctx.fillStyle = 'rgba(255,' + gold + ',150,' + s.alpha + ')';
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }
    drawStars();

    const questionInput = document.getElementById('questionInput');
    const askBtn = document.getElementById('askBtn');
    const resultCard = document.getElementById('resultCard');
    const resultValue = document.getElementById('resultValue');
    const interpretationsDiv = document.getElementById('interpretations');
    const soundToggle = document.getElementById('soundToggle');
    let soundEnabled = true;

    const answers = ['YES', 'NO', 'MAYBE', 'REPHRASE', 'REASK'];
    const interpretations = {
      'YES': [
        { title: '全景镜像', text: '能量顺畅，事态与心念同向。此刻宇宙能量与你共鸣，适宜推进。' },
        { title: '阴影瓶颈', text: '避免过度乐观而轻敌，仍须留意细节。' },
        { title: '动力链条', text: '可沿当前方向小步验证，信任直觉。' },
        { title: '转化锚点', text: '金生水，顺势而为，让行动自然流淌。' }
      ],
      'NO': [
        { title: '全景镜像', text: '当下能量阻滞，宜收不宜放。可能时机未到或方向需调整。' },
        { title: '阴影瓶颈', text: '避免因否定而放弃努力，阻力可能是保护。' },
        { title: '动力链条', text: '可转向备选方案或等待转机。' },
        { title: '转化锚点', text: '火克金，暂缓为宜，积蓄能量。' }
      ],
      'MAYBE': [
        { title: '全景镜像', text: '能量未定，存在变数。结果受后续选择影响。' },
        { title: '阴影瓶颈', text: '避免拖延决策，保持观察。' },
        { title: '动力链条', text: '可先收集信息，再作定夺。' },
        { title: '转化锚点', text: '土居中，待时而行，保持平衡。' }
      ],
      'REPHRASE': [
        { title: '全景镜像', text: '问题表述可更清晰，目前能量模糊。' },
        { title: '阴影瓶颈', text: '避免模糊或双重否定，让问题更纯粹。' },
        { title: '动力链条', text: '尝试把问题拆解成几个是非题。' },
        { title: '转化锚点', text: '木曲直，换一种问法，答案自现。' }
      ],
      'REASK': [
        { title: '全景镜像', text: '时机未到，稍后再问。能量需要沉淀。' },
        { title: '阴影瓶颈', text: '避免同一问题反复问，会扰乱信息。' },
        { title: '动力链条', text: '可隔日或换心境再问。' },
        { title: '转化锚点', text: '水再流，稍后重问，让心平静。' }
      ]
    };

    function playBell() {
      if (!soundEnabled || !window.AudioContext) return;
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
      } catch (e) {}
    }

    function swingPendulum(targetAngle) {
      const startTime = performance.now();
      const duration = 2500;
      const amplitude = 0.8;
      function swingStep(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        const decay = Math.exp(-3 * t);
        const swing = amplitude * Math.sin(10 * t) * decay;
        const target = targetAngle * (1 - decay);
        pivot.rotation.z = target + swing * 0.5;
        if (t < 1) requestAnimationFrame(swingStep);
        else pivot.rotation.z = targetAngle;
      }
      requestAnimationFrame(swingStep);
    }

    askBtn.addEventListener('click', () => {
      if (!questionInput.value.trim()) return;
      const randomIdx = Math.floor(Math.random() * answers.length);
      const answer = answers[randomIdx];
      playBell();
      let targetAngle = 0;
      switch(answer) {
        case 'YES': targetAngle = 0; break;
        case 'NO': targetAngle = Math.PI; break;
        case 'MAYBE': targetAngle = Math.PI/2; break;
        case 'REPHRASE': targetAngle = -Math.PI/2; break;
        case 'REASK': targetAngle = Math.PI/4; break;
      }
      swingPendulum(targetAngle);
      resultValue.textContent = answer;
      const interps = interpretations[answer];
      interpretationsDiv.innerHTML = interps.map(ip =>
        '<div class="interpretation-item"><h4 class="interpretation-item__title">' + ip.title + '</h4><p class="interpretation-item__text">' + ip.text + '</p></div>'
      ).join('');
      resultCard.style.display = 'block';
    });

    soundToggle.addEventListener('click', () => {
      soundEnabled = !soundEnabled;
      soundToggle.innerHTML = soundEnabled ? '🔊 声音开' : '🔇 声音关';
    });

    document.getElementById('historyBtn').addEventListener('click', () => {
      alert('历史记录功能可在实际项目中实现 localStorage 存储。');
    });

    document.getElementById('shareBtn').addEventListener('click', () => {
      const text = '灵摆仪式 · ' + resultValue.textContent + '\n「' + questionInput.value + '」\n\n' +
        Array.from(document.querySelectorAll('.interpretation-item')).map(el => el.innerText).join('\n');
      navigator.clipboard && navigator.clipboard.writeText(text).then(() => alert('结果已复制到剪贴板'));
    });
  </script>
</body>
</html>
